<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b12">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.png">
<title>Amygdala</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0b0b12;color:#e4e4ef}
#map{position:fixed;inset:0;z-index:0}

/* instruction overlay */
.instr{position:fixed;top:0;left:0;right:0;z-index:500;padding:10px 14px;transition:all .3s}
.instr.cr{background:rgba(239,68,68,.95)}.instr.hi{background:rgba(245,158,11,.95)}.instr.lo{background:rgba(11,11,18,.9)}
.instr-bar{display:flex;align-items:center;gap:10px}
.instr h1{font-size:14px;font-weight:800;flex:1;line-height:1.3}
.instr.cr h1,.instr.hi h1{color:#fff}.instr.lo h1{color:#aaa}
.instr .badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.2);color:#fff;white-space:nowrap}
.instr .sub{font-size:11px;margin-top:4px;opacity:.8}
.instr.lo .sub{color:#666}

/* bottom panel */
.bottom{position:fixed;bottom:0;left:0;right:0;z-index:500;padding:10px 14px 14px;background:rgba(11,11,18,.95);border-top:1px solid #1e1e30}
.call-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;background:#ef4444;color:#fff;font-size:16px;font-weight:800;text-align:center;text-decoration:none;font-family:inherit;cursor:pointer}
.call-btn:active{opacity:.8}
.info-row{display:flex;justify-content:space-between;font-size:11px;color:#6b6b85;padding:6px 0}
.info-row b{color:#e4e4ef}

/* demo bar */
.demo-bar{position:fixed;bottom:50px;left:0;right:0;z-index:500;display:flex;gap:6px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.demo-bar::-webkit-scrollbar{display:none}
.demo-btn{flex-shrink:0;padding:8px 12px;border:1px solid #1e1e30;border-radius:6px;background:rgba(18,18,28,.95);color:#e4e4ef;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.demo-btn:active{opacity:.7;transform:scale(0.97)}.demo-btn.on{border-color:#6366f1;color:#6366f1}

/* loading */
.ld{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0b12;z-index:9999}
.ld h1{font-size:24px;font-weight:800;margin-bottom:4px}.ld b{color:#6366f1}
.ld p{color:#6b6b85;font-size:13px;margin-bottom:16px}
.sp{width:24px;height:24px;border:3px solid #1e1e30;border-top-color:#6366f1;border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.hid{display:none!important}
</style>
</head>
<body>

<div class="ld" id="ld"><h1>Amyg<b>dala</b></h1><p>Scanning threats...</p><div class="sp"></div></div>

<div id="map"></div>

<div class="instr lo" id="instr">
  <div class="instr-bar">
    <h1 id="itxt">Scanning...</h1>
    <div class="badge" id="ibadge">...</div>
  </div>
  <div class="sub" id="isub"></div>
</div>

<div class="demo-bar" id="dbar">
  <div class="demo-btn on" onclick="goLive(this)">● LIVE</div>
  <div class="demo-btn" onclick="sim('abudhabi_2022',this)" style="border-color:#ef4444;color:#ef4444">⚠ Abu Dhabi '22</div>
  <div class="demo-btn" onclick="sim('turkey_2023',this)">Turkey '23</div>
  <div class="demo-btn" onclick="sim('israel_2023',this)">Israel '23</div>
  <div class="demo-btn" onclick="sim('valencia_2024',this)">Valencia '24</div>
  <div class="demo-btn" onclick="sim('japan_2024',this)">Japan '24</div>
</div>

<div class="bottom">
  <div class="info-row"><span>Phase: <b id="phase">-</b></span></div>
</div>

<script>
const A=window.location.origin+'/api/v1';
let lat=null,lon=null,M=null,userMarker=null,safeMarker=null,routeLine=null,alertMarkers=[];

// Parse ?lat=&lon= from URL (from email/SMS link)
const params=new URLSearchParams(window.location.search);
const urlLat=parseFloat(params.get('lat'));
const urlLon=parseFloat(params.get('lon'));

function initMap(){
  M=L.map('map',{zoomControl:false}).setView([lat,lon],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:18
  }).addTo(M);
  L.control.zoom({position:'bottomright'}).addTo(M);

  // User location marker
  userMarker=L.circleMarker([lat,lon],{radius:10,color:'#6366f1',fillColor:'#6366f1',fillOpacity:0.9,weight:2}).addTo(M);
  userMarker.bindPopup('<b>You are here</b>').openPopup();
}

let dangerZones=[];

function clearAlertMarkers(){
  alertMarkers.forEach(m=>M.removeLayer(m));alertMarkers=[];
}
function clearRoute(){
  if(safeMarker){M.removeLayer(safeMarker);safeMarker=null;}
  if(routeLine){M.removeLayer(routeLine);routeLine=null;}
  dangerZones.forEach(z=>M.removeLayer(z));dangerZones=[];
}
function clearMarkers(){clearAlertMarkers();clearRoute();}

function renderDecision(d){
  const u=d.urgency||'LOW';
  const el=document.getElementById('instr');
  el.className='instr '+(u==='HIGH'?'cr':u==='MEDIUM'?'hi':'lo');
  document.getElementById('itxt').textContent=d.instruction;
  document.getElementById('ibadge').textContent=d.action;
  document.getElementById('isub').textContent=d.fallback_instruction||'';
  document.getElementById('phase').textContent=d.phase||'-';
  // Always fetch route to safety when there's a threat
  if(d.action && d.action !== 'MONITOR'){
    fetchRouteToSafety(lat, lon);
  }
}

async function fetchRouteToSafety(fromLat, fromLon){
  try{
    const r=await fetch(A+'/transport/status/'+fromLat+'/'+fromLon);
    const d=await r.json();
    const opts=(d.options||[]).filter(t=>t.status!=='closed');
    if(opts.length>0) await drawRoute(fromLat, fromLon, opts[0]);
  }catch(e){console.log('Route fetch failed:',e)}
}

async function drawRoute(fromLat, fromLon, dest){
  clearRoute();

  const toLat=dest.location.latitude, toLon=dest.location.longitude;
  const dist=dest.distance_km||0;

  // Destination marker
  safeMarker=L.marker([toLat,toLon],{
    icon:L.divIcon({className:'',html:'<div style="background:#22c55e;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:800;white-space:nowrap;box-shadow:0 2px 12px #0006">'+dest.name.substring(0,30)+'<br><span style="font-weight:400;font-size:10px">'+dist+'km away</span></div>',iconSize:[0,0],iconAnchor:[-5,15]})
  }).addTo(M);

  // Mark danger zones from alert markers (persistent, not cleared by route redraw)
  dangerZones.forEach(z=>M.removeLayer(z));dangerZones=[];
  alertMarkers.forEach(m=>{
    if(!m.getLatLng)return;
    const ll=m.getLatLng();
    const dz=L.circle([ll.lat,ll.lng],{radius:8000,color:'#ef4444',fillColor:'#ef4444',fillOpacity:0.1,weight:1.5,dashArray:'6,4'}).addTo(M);
    dangerZones.push(dz);
  });

  // OSRM road routing — driving for long distances, foot for short
  const profile=dist>10?'driving':'foot';
  try{
    const rr=await fetch('https://router.project-osrm.org/route/v1/'+profile+'/'+fromLon+','+fromLat+';'+toLon+','+toLat+'?overview=full&geometries=geojson');
    const rd=await rr.json();
    if(rd.routes&&rd.routes[0]){
      const coords=rd.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      const mins=Math.round(rd.routes[0].duration/60);
      const km=Math.round(rd.routes[0].distance/1000);
      routeLine=L.polyline(coords,{color:'#22c55e',weight:5,opacity:0.85}).addTo(M);
      // Route info label at midpoint
      const mid=coords[Math.floor(coords.length/2)];
      const info=L.marker(mid,{icon:L.divIcon({className:'',html:'<div style="background:#22c55e;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap">'+km+'km ~ '+mins+'min</div>',iconSize:[0,0],iconAnchor:[-5,5]})}).addTo(M);
      alertMarkers.push(info);// so it gets cleared
    }else{
      routeLine=L.polyline([[fromLat,fromLon],[toLat,toLon]],{color:'#22c55e',weight:3,dashArray:'8,8'}).addTo(M);
    }
  }catch(e){
    routeLine=L.polyline([[fromLat,fromLon],[toLat,toLon]],{color:'#22c55e',weight:3,dashArray:'8,8'}).addTo(M);
  }
  M.fitBounds([[fromLat,fromLon],[toLat,toLon]],{padding:[80,60]});
}

async function renderAlerts(alerts){
  clearAlertMarkers();
  alerts.slice(0,20).forEach(a=>{
    if(!a.location)return;
    const color=a.severity==='critical'?'#ef4444':a.severity==='high'?'#f59e0b':'#eab308';
    const m=L.circleMarker([a.location.latitude,a.location.longitude],{
      radius:a.severity==='critical'?14:a.severity==='high'?10:7,
      color:color,fillColor:color,fillOpacity:0.3,weight:2
    }).addTo(M);
    m.bindPopup('<b>'+a.title.substring(0,60)+'</b><br><span style="font-size:11px;color:#888">'+a.source.name+'</span>');
    alertMarkers.push(m);
  });
}

async function go(){
  let decision=null;
  try{
    const r=await fetch(A+'/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({latitude:lat,longitude:lon})});
    decision=await r.json();
  }catch(e){document.getElementById('itxt').textContent='OFFLINE — use cached data.';}
  // Draw alerts FIRST (so danger zones can use them)
  try{
    const r=await fetch(A+'/alerts/region/'+lat+'/'+lon+'?radius_km=500');
    await renderAlerts((await r.json()).alerts||[]);
  }catch(e){}
  // THEN render decision + route (after alert markers exist)
  if(decision){
    renderDecision(decision);
  }
}

async function sim(s,btn){
  document.querySelectorAll('.demo-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  try{
    // Get scenario location first
    const sc=await(await fetch(A+'/simulate/scenarios')).json();
    const sloc=sc[s];
    if(sloc){
      // Move map to event location and update lat/lon for routing
      lat=sloc.default_lat; lon=sloc.default_lon;
      M.setView([lat,lon],10);
    }
    clearMarkers();
    // Run simulation
    const r=await fetch(A+'/simulate/'+s,{method:'POST'});
    const d=await r.json();d.urgency=d.urgency||'HIGH';
    // Render the decision (this triggers route fetching)
    renderDecision(d);
    document.getElementById('ibadge').textContent='⚠ SIM: '+d.action;
    // Also draw alert markers from threat_summary
    const threats=d.threat_summary?d.threat_summary.split(';'):[];
    threats.forEach((t,i)=>{
      if(!sloc) return;
      const offset=(i-threats.length/2)*0.05;
      const m=L.circleMarker([lat+offset,lon+offset*0.7],{radius:12,color:'#ef4444',fillColor:'#ef4444',fillOpacity:0.2,weight:2}).addTo(M);
      m.bindPopup('<b>'+t.trim()+'</b>');
      alertMarkers.push(m);
    });
  }catch(e){console.log('Sim error:',e)}
}

function goLive(btn){
  document.querySelectorAll('.demo-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  M.setView([lat,lon],13);go();
}

async function init(){
  // Use URL params if present (from email/SMS link), otherwise GPS
  if(!isNaN(urlLat)&&!isNaN(urlLon)){lat=urlLat;lon=urlLon;}
  else{
    const g=await new Promise(r=>{
      if(!navigator.geolocation){r({lat:42.01,lon:23.10});return}
      navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lon:p.coords.longitude}),()=>r({lat:42.01,lon:23.10}),{timeout:5000,maximumAge:60000});
    });
    lat=g.lat;lon=g.lon;
  }
  initMap();
  await go();
  document.getElementById('ld').classList.add('hid');
  setInterval(go,60000);
}
init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
</script>
</body>
</html>
